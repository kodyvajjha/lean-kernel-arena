description: |
  **sokonanoda** — a Lean 4 kernel whose conversion checker is
  based on normalization by evaluation (NbE).

  This is a fork of
  [still-nanoda](https://github.com/SchrodingerZhu/still-nanoda).
  The conversion algorithm uses "glued" evaluation, as in András Kovács'
  [smalltt](https://github.com/AndrasKovacs/smalltt).
url: https://github.com/intgrah/sokonanoda
ref: master
rev: f1c4b12ca88a37fcc030eef2a59260a4a2d04a24
build: |
  cargo build --release
  cat > config.json <<__END__
   {
     "use_stdin": true,
     "nat_extension": true,
     "string_extension": true,
     "unpermitted_axiom_hard_error": false,
     "unsafe_permit_all_axioms": true,
     "num_threads": 4
   }
  __END__
run: |
  target/release/sokonanoda config.json < "$IN" || exit 1
